<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Kit — Inidė Jasnauskaitė</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ig: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      --dark: #0a0a0a; --text: #262626; --text2: #737373;
      --bg: #FAFAFA; --white: #fff; --border: #DBDBDB;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    /* Top bar */
    .topbar { background: var(--dark); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; }
    .topbar__logo { font-family: 'Playfair Display', serif; font-size: 18px; color: #fff; }
    .topbar__right { display: flex; align-items: center; gap: 16px; }
    .topbar__badge { padding: 4px 12px; border: 1px solid rgba(255,255,255,.2); border-radius: 999px; font-size: 12px; color: rgba(255,255,255,.6); display: flex; align-items: center; gap: 6px; }
    .topbar__badge span { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
    .logout { font-size: 12px; color: rgba(255,255,255,.45); display: flex; align-items: center; gap: 5px; transition: color .2s; }
    .logout:hover { color: #fff; }

    /* Hero */
    .hero { background: var(--dark); padding: 60px 40px 80px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: var(--ig); opacity: .07; pointer-events: none; }
    .hero__badge { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; background: var(--ig); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 14px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: #fff; margin-bottom: 10px; }
    .hero p { font-size: 15px; color: rgba(255,255,255,.55); max-width: 480px; margin: 0 auto; }

    /* Container */
    .wrap { max-width: 1100px; margin: 0 auto; padding: 60px 40px; }
    .section { margin-bottom: 64px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .section-title i { background: var(--ig); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .stat-card { background: var(--white); border-radius: 16px; padding: 24px; border: 1px solid var(--border); text-align: center; transition: box-shadow .2s; }
    .stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .stat-card__icon { width: 44px; height: 44px; border-radius: 12px; background: var(--ig); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 18px; color: #fff; }
    .stat-card__num { font-size: 28px; font-weight: 700; color: var(--text); }
    .stat-card__label { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .stat-card__sub { font-size: 12px; color: #bc1888; font-weight: 600; margin-top: 6px; }

    /* Platforms */
    .platforms { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .platform { background: var(--white); border-radius: 14px; padding: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
    .platform__icon { width: 48px; height: 48px; border-radius: 12px; background: var(--ig); display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; flex-shrink: 0; }
    .platform__name { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .platform__num { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .platform__sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* Audience */
    .audience-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px; }
    .aud-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .bar-label { font-size: 14px; font-weight: 500; min-width: 80px; }
    .bar-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: var(--ig); }
    .bar-pct { font-size: 13px; font-weight: 700; color: var(--text2); min-width: 36px; text-align: right; }
    .gender-split { display: flex; height: 10px; border-radius: 99px; overflow: hidden; margin-top: 8px; }
    .gender-female { background: var(--ig); }
    .gender-male   { background: #e5e7eb; }
    .gender-legend { display: flex; gap: 20px; margin-top: 10px; font-size: 13px; color: var(--text2); }
    .gender-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }

    /* Packages */
    .pkg-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
    .pkg-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 20px; padding: 28px; position: relative; transition: box-shadow .2s, border-color .2s; }
    .pkg-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    .pkg-card.featured { border-color: #bc1888; }
    .pkg-card__tag { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 4px 12px; border-radius: 99px; margin-bottom: 12px; }
    .pkg-card.featured .pkg-card__tag { background: var(--ig); color: #fff; }
    .pkg-card:not(.featured) .pkg-card__tag { background: #f4f5f7; color: var(--text2); }
    .pkg-card__name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .pkg-card__price { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .pkg-card.featured .pkg-card__price { background: var(--ig); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .pkg-card__vat { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
    .pkg-card__items { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .pkg-card__items li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; }
    .pkg-card__items li i { color: #bc1888; margin-top: 2px; flex-shrink: 0; }
    .pkg-card__items li.optional { color: var(--text2); }
    .pkg-card__note { font-size: 13px; color: var(--text2); font-style: italic; border-top: 1px solid var(--border); padding-top: 14px; }

    /* How we work */
    .how-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
    .how-card { background: var(--white); border-radius: 16px; padding: 24px; border: 1px solid var(--border); }
    .how-card__icon { width: 40px; height: 40px; border-radius: 10px; background: var(--ig); display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; margin-bottom: 14px; }
    .how-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .how-card p { font-size: 14px; color: var(--text2); line-height: 1.6; }

    /* Confidential footer */
    .confidential { background: var(--dark); padding: 32px 40px; text-align: center; margin-top: 60px; }
    .confidential p { font-size: 13px; color: rgba(255,255,255,.4); max-width: 600px; margin: 0 auto; }

    @media (max-width: 900px) {
      .stats, .platforms, .audience-grid, .pkg-grid, .how-grid { grid-template-columns: 1fr; }
      .wrap { padding: 40px 20px; }
      .topbar { padding: 14px 20px; }
      .hero { padding: 40px 20px 60px; }
    }

    /* Print button */
    .print-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 16px; background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2); border-radius: 999px;
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,.8);
      cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .print-btn:hover { background: rgba(255,255,255,.2); color: #fff; }

    /* Print / PDF styles */
    @media print {
      .no-print { display: none !important; }
      body { background: #fff; }
      .topbar { background: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .hero   { -webkit-print-color-adjust: exact; print-color-adjust: exact; page-break-after: avoid; }
      .section { page-break-inside: avoid; }
      .pkg-card { page-break-inside: avoid; }
      .how-card { page-break-inside: avoid; }
      .stat-card__icon { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .bar-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .gender-female { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .confidential { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar__logo">INIDĖ JASNAUSKAITĖ</span>
  <div class="topbar__right">
    <span class="topbar__badge"><span></span> Confidential</span>
    <button class="print-btn no-print" onclick="window.print()"><i class="fas fa-print"></i> Save as PDF</button>
    <a class="logout no-print" href="/media-kit/logout.php"><i class="fas fa-right-from-bracket"></i> Logout</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero__badge" style="position:relative;z-index:1">Media Kit 2025</div>
  <h1 style="position:relative;z-index:1">INIDĖ JASNAUSKAITĖ</h1>
  <p style="position:relative;z-index:1">Fashion · Beauty · Travel · Content Creator</p>
</div>

<!-- CONTENT -->
<div class="wrap" id="kitContent">
  <p style="text-align:center;color:#6b7280;padding:40px">Loading media kit…</p>
</div>

<!-- CONFIDENTIAL FOOTER -->
<div class="confidential">
  <p><i class="fas fa-lock" style="margin-right:8px"></i>
     This document is strictly confidential and intended solely for the recipient.
     Redistribution or publication of any part of this document is prohibited.</p>
</div>

<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadKit() {
  const wrap = document.getElementById('kitContent');
  try {
    const res = await fetch('/media-kit/data');
    if (!res.ok) { wrap.innerHTML = '<p style="text-align:center;color:#e00">Not authenticated.</p>'; return; }
    const s = await res.json();
    const ig = s.instagram || {};
    const tt = s.tiktok    || {};
    const yt = s.youtube   || {};
    const aud = s.audience || {};
    const pkgs = s.packages || [];
    const gf = aud.gender_female ?? 75;

    wrap.innerHTML = `

    <!-- KEY METRICS -->
    <div class="section">
      <h2 class="section-title"><i class="fas fa-chart-line"></i> Key Metrics</h2>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-card__icon"><i class="fab fa-instagram"></i></div>
          <div class="stat-card__num">${esc(ig.followers||'—')}</div>
          <div class="stat-card__label">Instagram Followers</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon"><i class="fas fa-fire"></i></div>
          <div class="stat-card__num">${esc(ig.er||'—')}</div>
          <div class="stat-card__label">Engagement Rate</div>
          <div class="stat-card__sub">Above industry average</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon"><i class="fas fa-eye"></i></div>
          <div class="stat-card__num">${esc(ig.avg_reach||'—')}</div>
          <div class="stat-card__label">Avg. Post Reach</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon"><i class="fas fa-play"></i></div>
          <div class="stat-card__num">${esc(ig.avg_reel_views||'—')}</div>
          <div class="stat-card__label">Avg. Reel Views</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon"><i class="fas fa-circle-play"></i></div>
          <div class="stat-card__num">${esc(ig.story_view_rate||'—')}</div>
          <div class="stat-card__label">Story View Rate</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon"><i class="fas fa-image"></i></div>
          <div class="stat-card__num">${esc(ig.posts||'—')}</div>
          <div class="stat-card__label">Total Posts</div>
        </div>
      </div>
    </div>

    <!-- PLATFORMS -->
    <div class="section">
      <h2 class="section-title"><i class="fas fa-share-nodes"></i> Platforms</h2>
      <div class="platforms">
        <div class="platform">
          <div class="platform__icon"><i class="fab fa-instagram"></i></div>
          <div>
            <div class="platform__name">Instagram</div>
            <div class="platform__num">${esc(ig.followers||'—')}</div>
            <div class="platform__sub">followers · ${esc(ig.posts||'—')} posts</div>
          </div>
        </div>
        <div class="platform">
          <div class="platform__icon"><i class="fab fa-tiktok"></i></div>
          <div>
            <div class="platform__name">TikTok</div>
            <div class="platform__num">${esc(tt.followers||'—')}</div>
            <div class="platform__sub">followers · ${esc(tt.avg_views||'—')} avg views</div>
          </div>
        </div>
        <div class="platform">
          <div class="platform__icon"><i class="fab fa-youtube"></i></div>
          <div>
            <div class="platform__name">YouTube</div>
            <div class="platform__num">${esc(yt.subscribers||'—')}</div>
            <div class="platform__sub">subscribers</div>
          </div>
        </div>
      </div>
    </div>

    <!-- AUDIENCE -->
    <div class="section">
      <h2 class="section-title"><i class="fas fa-users"></i> Audience Demographics</h2>
      <div class="audience-grid">
        <div>
          <p class="aud-title">Age Groups</p>
          ${(aud.age||[]).map(r=>`
            <div class="bar-row">
              <span class="bar-label">${esc(r.label)}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${r.pct}%"></div></div>
              <span class="bar-pct">${r.pct}%</span>
            </div>`).join('')}
        </div>
        <div>
          <p class="aud-title">Top Locations</p>
          ${(aud.locations||[]).map(r=>`
            <div class="bar-row">
              <span class="bar-label">${esc(r.label)}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${r.pct}%"></div></div>
              <span class="bar-pct">${r.pct}%</span>
            </div>`).join('')}
        </div>
        <div>
          <p class="aud-title">Gender Split</p>
          <div class="gender-split">
            <div class="gender-female" style="width:${gf}%"></div>
            <div class="gender-male" style="width:${100-gf}%"></div>
          </div>
          <div class="gender-legend">
            <span><span class="gender-dot" style="background:linear-gradient(45deg,#f09433,#bc1888)"></span>Female ${gf}%</span>
            <span><span class="gender-dot" style="background:#e5e7eb"></span>Male ${100-gf}%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- HOW WE WORK -->
    <div class="section">
      <h2 class="section-title"><i class="fas fa-handshake"></i> How We Work</h2>
      <div class="how-grid">
        <div class="how-card">
          <div class="how-card__icon"><i class="fas fa-palette"></i></div>
          <h3>Creative Freedom</h3>
          <p>Inidė crafts each collaboration with full creative direction — resulting in authentic content that resonates with her audience and delivers real brand impact.</p>
        </div>
        <div class="how-card">
          <div class="how-card__icon"><i class="fas fa-credit-card"></i></div>
          <h3>Payment Terms</h3>
          <p>Smaller packages: 100% upfront.<br>Larger campaigns: 50% upfront, 50% on delivery. All prices exclude VAT.</p>
        </div>
        <div class="how-card">
          <div class="how-card__icon"><i class="fas fa-clock"></i></div>
          <h3>Production Timeline</h3>
          <p>Story packages: ~2 weeks.<br>Reels & full campaigns: 1–2 months. Timeline begins once brief and deposit are confirmed.</p>
        </div>
        <div class="how-card">
          <div class="how-card__icon"><i class="fas fa-calendar-check"></i></div>
          <h3>Publication</h3>
          <p>Publication date is confirmed in the collaboration agreement. Content is prepared in advance and published on the agreed date.</p>
        </div>
      </div>
    </div>

    <!-- PACKAGES -->
    <div class="section">
      <h2 class="section-title"><i class="fas fa-tags"></i> Collaboration Packages</h2>
      <div class="pkg-grid">
        ${pkgs.map(pk => `
        <div class="pkg-card${pk.featured?' featured':''}">
          <span class="pkg-card__tag">${esc(pk.tag||'')}</span>
          <div class="pkg-card__name">${esc(pk.name||'')}</div>
          <div class="pkg-card__price">${esc(pk.price||'')}</div>
          <div class="pkg-card__vat">${esc(pk.vat||'+ VAT')} · ${esc(pk.period||'per campaign')}</div>
          <ul class="pkg-card__items">
            ${(pk.items||[]).map(item => {
              const isOpt = item.toLowerCase().includes('optional');
              return `<li class="${isOpt?'optional':''}">
                <i class="fas ${isOpt?'fa-plus':'fa-check'}"></i>
                <span>${esc(item)}</span>
              </li>`;
            }).join('')}
          </ul>
          ${pk.note ? `<p class="pkg-card__note">${esc(pk.note)}</p>` : ''}
        </div>`).join('')}
      </div>
    </div>

    `;
  } catch(e) {
    wrap.innerHTML = `<p style="text-align:center;color:#e00;padding:40px">Error loading: ${e.message}</p>`;
  }
}

loadKit();
</script>
</body>
</html>
